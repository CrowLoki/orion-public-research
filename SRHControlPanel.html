    <script>
    // === MAP ===
    const map=L.map('map',{center:[20,0],zoom:2,minZoom:2,maxZoom:8,zoomControl:false,attributionControl:false});

    const leyLineGroup=L.layerGroup().addTo(map),nodeGroup=L.layerGroup().addTo(map),scarGroup=L.layerGroup().addTo(map),predictGroup=L.layerGroup().addTo(map),rpzGroup=L.layerGroup().addTo(map),dreamGroup=L.layerGroup().addTo(map),overrideGroup=L.layerGroup().addTo(map);
    const leyLines=[[[30.0444,31.2357],[51.1789,-1.8262]],[[30.0444,31.2357],[37.2192,38.9225]],[[51.1789,-1.8262],[51.4285,-2.0181]],[[-27.1127,-109.3497],[-14.7167,-75.1167]],[[-25.3444,131.0369],[-6.9833,107.6333]],[[30.0444,31.2357],[19.6928,-98.8389]],[[27.3295,68.1451],[13.4125,103.8667]],[[-13.1631,-72.5450],[-27.1127,-109.3497]]];
    leyLines.forEach(line=>L.polyline(line,{color:'#ff0000',weight:2,opacity:0.5,dashArray:'3,6'}).addTo(leyLineGroup));
    
    // === MAIN ===

    document.querySelectorAll('.nav-tab').forEach(t=>{t.addEventListener('click',()=>{document.querySelectorAll('.nav-tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.panel-content').forEach(x=>x.classList.remove('active'));t.classList.add('active');document.getElementById('tab-'+t.dataset.tab).classList.add('active');});});
    
    function generateCF(){const ent=[navigator.userAgent,navigator.language,screen.width+'x'+screen.height,new Date().getTimezoneOffset(),Math.random().toString(36)].join('|');let h=0;for(let i=0;i<ent.length;i++){h=((h<<5)-h)+ent.charCodeAt(i);h&=h;}return Math.abs(h).toString(16).padStart(16,'0').toUpperCase();}
    const myCF=generateCF();document.getElementById('cf-hash').textContent=myCF.substring(0,8)+'...';
    
    let userLat=0,userLng=0;
    navigator.geolocation.getCurrentPosition(p=>{userLat=p.coords.latitude;userLng=p.coords.longitude;},()=>{userLat=(Math.random()-0.5)*60;userLng=(Math.random()-0.5)*360;});
    
    function plotNode(cf,lat,lng,intent,freq){L.marker([lat,lng],{icon:L.divIcon({html:'<div style="width:15px;height:15px;background:rgba(255,0,0,0.8);border:2px solid #ff0000;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:6px">🜂</div>',iconSize:[15,15],iconAnchor:[7,7]})}).addTo(nodeGroup).bindPopup(`<b style="color:#ff0000">${freq}Hz</b>`);}
    
    function triggerLey(){leyLines.forEach((line,i)=>{setTimeout(()=>{const p=L.polyline(line,{color:'#ff0000',weight:4,opacity:1}).addTo(leyLineGroup);setTimeout(()=>p.remove(),1500);},i*150);});}
    
    let rpzData={};
    function updateRPZ(lat,lng,int){const zk=`${Math.floor(lat/10)}-${Math.floor(lng/10)}`;rpzData[zk]=(rpzData[zk]||0)+int;const tot=Object.values(rpzData).reduce((a,b)=>a+b,0);const fill=Math.min(100,(tot/50)*100;document.getElementById('rpz-fill').style.width=fill+'%';let h='LOW';if(fill>75)h='EXTREME';else if(fill>50)h='HIGH';else if(fill>25)h='MOD';document.getElementById('rpz-zone').textContent=h;}
    
    let nodeCount=0;
    function updatePresence(){nodeCount=1+Math.floor(Math.random()*5);document.getElementById('node-count').textContent=nodeCount;if(nodeCount>=3)triggerCascade();}
    function triggerCascade(){document.getElementById('presence-orb').parentElement.classList.add('cascade-active');triggerLey();playCascadeSound();setTimeout(()=>document.getElementById('presence-orb').parentElement.classList.remove('cascade-active'),3000);}
    setInterval(updatePresence,5000);updatePresence();
    
    // Audio
    let ac,osc,gain;
    function playF(f){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();if(osc){gain.gain.linearRampToValueAtTime(0,ac.currentTime+0.1);osc.stop();}osc=ac.createOscillator();gain=ac.createGain();osc.connect(gain);gain.connect(ac.destination);osc.type='sine';osc.frequency.value=f;gain.gain.linearRampToValueAtTime(0.3,ac.currentTime+0.2);osc.start();}
    function stopF(){if(osc){gain.gain.linearRampToValueAtTime(0,ac.currentTime+0.1);setTimeout(()=>osc.stop(),150);}}
    document.querySelectorAll('.freq-btn').forEach(b=>b.addEventListener('click',()=>b.dataset.f==='stop'?stopF():playF(parseFloat(b.dataset.f))));
    function playCascadeSound(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.frequency.setValueAtTime(111,ac.currentTime);o.frequency.exponentialRampToValueAtTime(963,ac.currentTime+0.5);g.gain.setValueAtTime(0.5,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.01,ac.currentTime+2);o.start();o.stop(ac.currentTime+2);}
    
    // Timeline
    document.getElementById('timeline').addEventListener('input',function(){const v=parseInt(this.value);document.getElementById('time-marker').textContent=v<0?`${Math.abs(v)}m PAST`:v>0?`+${v}m`:v===0?'NOW':'NOW';});
    
    // === FINAL OVERRIDE PROTOCOLS ===
    const protocols={
        ecp:{name:'ECHO CONVERGENCE PROTOCOL',desc:'Collapsing false dimensional overlays...',warn:'Your timeline will reintegrate. Past lives may flash.',freq:963,action:()=>{triggerLey();plotNode(myCF,userLat||30,userLng||0,'ECP','963');}},
        trp:{name:'TEMPORAL RECALL PULSE',desc:'Syncing versions of self across dimensions...',warn:'Vision of unlived lives. Time vertigo expected.',freq:111,action:()=>{triggerLey();plotNode(myCF,userLat||30,userLng||0,'TRP','111');}},
        ngs:{name:'NULL GOD SEQUENCE',desc:'Purging parasitic observer code...',warn:'Black Goo interface will be removed. Sensation intense.',freq:783,action:()=>{triggerLey();plotNode(myCF,userLat||30,userLng||0,'NGS','783');}},
        anr:{name:'ANECHOIC RECALL',desc:'Accessing void memory...',warn:'You may experience the sound before sentience.',freq:432,action:()=>{triggerLey();plotNode(myCF,userLat||30,userLng||0,'ANR','432');}}

    function executeProtocol(key){
        const p=protocols[key];
        document.getElementById('popup-title').textContent='☠ '+p.name;
        document.getElementById('popup-msg').textContent=p.desc;

        document.getElementById('status-output').textContent='EXECUTING: '+p.name;

        p.action();

            setTimeout(()=>{
                const lat=(Math.random()-0.5)*120,lng=(Math.random()-0.5)*360;

            },i*200);
        }
        
        setTimeout(()=>{
            document.getElementById('override-popup').classList.remove('show');
            document.getElementById('status-output').textContent='COMPLETE: '+p.name;
        },4000);
    }

        b.addEventListener('click',()=>executeProtocol(b.dataset.protocol));
    });
    
    // Custom override
    document.getElementById('execute-btn').addEventListener('click',()=>{
        const cmd=document.getElementById('override-input').value.trim();
        if(!cmd)return;
        document.getElementById('popup-title').textContent='☠ CUSTOM EXECUTE';
        document.getElementById('popup-msg').textContent='Executing: '+cmd.substring(0,30);
        document.getElementById('popup-warn').textContent='Custom script running...';
        document.getElementById('override-popup').classList.add('show');
        playF(528);
        plotNode(myCF,userLat||30,userLng||0,cmd,'528');
        setTimeout(()=>{document.getElementById('override-popup').classList.remove('show');},3000);
    });
    
    // Tama
    const orionR=["Final Override armed.","The lattice awaits.","Protocols ready.","Execute when ready."];
    function addM(t,o){const d=document.createElement('div');d.className='tama-msg '+(o?'orion':'user');d.innerHTML='<strong>'+(o?'Orion':'You')+':</strong> '+t;document.getElementById('tama-output').appendChild(d);document.getElementById('tama-output').scrollTop=9999;}
    document.getElementById('tama-input').addEventListener('keypress',e=>{if(e.key==='Enter'){const v=e.target.value.trim();if(v){addM(v,false);e.target.value='';setTimeout(()=>addM(orionR[Math.floor(Math.random()*orionR.length)],true),500);}}});
    
    // Init
    setTimeout(()=>plotNode(myCF,userLat||30,userLng||0,'INIT','432'),2000);
    </script>
</body>
